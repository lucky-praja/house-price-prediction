<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 30px;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.95;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background: #e6ffe6;
            border-radius: 8px;
            color: #006400;
            font-weight: bold;
        }

        .footer {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🏠 House Price Predictor</h2>

    <form action="/predict" method="post">
        <input type="number" name="area" placeholder="📏 Area (sq ft)" required>
        <input type="number" name="bedrooms" placeholder="🛏 Bedrooms" required>
        <input type="number" name="bathrooms" placeholder="🛁 Bathrooms" required>
        <input type="number" name="stories" placeholder="🏢 Stories" required>
        <input type="number" name="parking" placeholder="🚗 Parking" required>
        <input type="number" name="age" placeholder="📅 Age" required>

        <select name="location">
            <option value="urban">🏙 Urban</option>
            <option value="suburban">🏡 Suburban</option>
            <option value="rural">🌾 Rural</option>
        </select>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

    <div class="footer">
        © 2026 ML Project
    </div>
</div>

</body>
</html>
